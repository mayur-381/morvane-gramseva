<script>
function applyFilters(selectedCategory = "all", selectedYear = "all") {
  const blocks = document.querySelectorAll(".year-block");

  blocks.forEach(block => {
    const blockCategory = block.dataset.category;
    const blockYear = block.dataset.year;

    const categoryMatch = (selectedCategory === "all" || blockCategory === selectedCategory);
    const yearMatch = (selectedYear === "all" || blockYear === selectedYear);

    block.style.display = (categoryMatch && yearMatch) ? "block" : "none";
  });
}

/* SLIDER BUTTONS */
document.querySelectorAll('.photo-slider').forEach(slider => {
  const grid = slider.querySelector('.photo-grid');
  slider.querySelector('.next').onclick = () =>
    grid.scrollBy({ left: 300, behavior: 'smooth' });
  slider.querySelector('.prev').onclick = () =>
    grid.scrollBy({ left: -300, behavior: 'smooth' });
});

/* FULLSCREEN POPUP */
const popup = document.createElement('div');
popup.className = 'image-popup';
popup.innerHTML = `<span class="popup-close">&times;</span><img>`;
document.body.appendChild(popup);

const popupImg = popup.querySelector('img');
const closeBtn = popup.querySelector('.popup-close');

document.querySelectorAll('.photo-grid img').forEach(img => {
  img.addEventListener('click', () => {
    popupImg.src = img.src;
    popup.style.display = 'flex';
  });
});

closeBtn.onclick = () => popup.style.display = 'none';
popup.onclick = e => {
  if (e.target === popup) popup.style.display = 'none';
};
</script>
