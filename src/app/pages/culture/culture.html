<section class="village-page">

  <h1 class="page-title">माझं गाव – संस्कृती,उत्सव व पर्यटन</h1>

  <!-- GANPATI -->
  <section class="gallery-section">
    <h2>🎉 गणपती उत्सव</h2>
    <p class="section-desc">दरवर्षी मोठ्या उत्साहात साजरा होणारा गणपती उत्सव</p>

    <div class="photo-slider">
      <button class="nav prev" (click)="scrollLeft(ganpati)">‹</button>

      <div class="photo-grid" #ganpati>
        <div class="image-wrap"></div>
        <img src="images/ganpati-1.jpeg" (click)="openImage('images/ganpati-1.jpeg')">
        <img src="images/ganpati-2.jpeg" (click)="openImage('images/ganpati-2.jpeg')">
        <img src="images/ganpati-3.jpeg" (click)="openImage('images/ganpati-3.jpeg')">
        <img src="images/ganpati-4.jpeg" (click)="openImage('images/ganpati-4.jpeg')">
        <img src="images/ganpati-5.jpeg" (click)="openImage('images/ganpati-5.jpeg')">
      
      </div>

      <button class="nav next" (click)="scrollRight(ganpati)">›</button>
    </div>
  </section>

  <!-- SHIMGA -->
  <section class="gallery-section">
    <h2>🔥 शिमगा उत्सव</h2>

    <div class="photo-slider">
      <button class="nav prev" (click)="scrollLeft(shimga)">‹</button>

      <div class="photo-grid" #shimga>
        <div class="media-item"><img src="images/shimga-1.jpeg" (click)="openImage('images/shimga-1.jpeg')"></div>
        <div class="media-item video-item"><video controls> <source src="videos/shimga-festival.mp4" type="video/mp4"> </video></div>
        <img src="images/shimga-2.jpeg" (click)="openImage('images/shimga-2.jpeg')">
        <div class="media-item video-item"><video controls poster="images/video2.jpg"><source src="videos/shimga1-festival.mp4" type="video/mp4"></video></div>
        <img src="images/shimga-3.jpeg" (click)="openImage('images/shimga-3.jpeg')">
        <!--<img src="images/shimga-3.jpg" (click)="openImage('images/shimga-3.jpg')">--> 
      </div>
        <button class="nav next" (click)="scrollRight(shimga)">›</button>
    </div>
  </section>

  <div class="fullscreen-overlay" *ngIf="selectedImage" (click)="closeImage()">
